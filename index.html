<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="公考复习">
<title>公考复习 · 成语名句</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #f5f0eb; color: #2c2416; min-height: 100dvh;
}
header{
  background: #8b1a1a; color:#fff; padding:16px 20px;
  text-align:center; position:sticky; top:0; z-index:10;
  box-shadow: 0 2px 8px rgba(0,0,0,.15);
}
header h1{font-size:1.25rem;letter-spacing:2px}
nav{
  display:flex; gap:4px; padding:12px 12px 0; overflow-x:auto;
  background:#fff; position:sticky; top:56px; z-index:9;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
nav button{
  flex-shrink:0; padding:10px 18px; border:none; border-radius:20px 20px 0 0;
  background:#f0ebe4; color:#666; font-size:.9rem; cursor:pointer;
  transition:.2s;
}
nav button.active{background:#8b1a1a;color:#fff;font-weight:600}
main{padding:16px; max-width:700px; margin:0 auto}
.page{display:none}
.page.active{display:block}

.card{
  background:#fff; border-radius:16px; padding:24px 20px;
  margin-bottom:14px; box-shadow: 0 2px 12px rgba(0,0,0,.05);
}
.card .tag{
  display:inline-block; padding:2px 12px; border-radius:10px;
  font-size:.75rem; font-weight:600; letter-spacing:1px; margin-bottom:12px;
}
.tag-idiom{background:#fff0e0;color:#b85c00}
.tag-quote{background:#e8f0fe;color:#1a56a8}
.tag-custom{background:#e8fce8;color:#1a7a1a}
.card .content{
  font-size:1.25rem; line-height:1.8; margin-bottom:8px;
  letter-spacing:.5px;
}
.card .note{font-size:.85rem;color:#888;line-height:1.5}

.random-card{text-align:center;padding:40px 20px}
.random-card .content{font-size:1.6rem;margin-bottom:12px}
.random-card .meaning{font-size:1.1rem;color:#8b1a1a;line-height:1.8;margin-bottom:16px}
.random-card .note{font-size:1rem;color:#666;margin-bottom:16px;line-height:1.8}

.btn{
  display:inline-block; padding:12px 28px; border:none; border-radius:25px;
  font-size:1rem; cursor:pointer; transition:.2s; font-weight:600;
  letter-spacing:1px;
}
.btn-primary{background:#8b1a1a;color:#fff}
.btn-primary:active{background:#6b0f0f;transform:scale(.96)}
.btn-outline{background:transparent;border:2px solid #8b1a1a;color:#8b1a1a}
.btn-outline:active{background:#fdf2f2;transform:scale(.96)}
.btn-sm{padding:6px 16px;font-size:.8rem;border-radius:15px}
.btn-block{display:block;width:100%;text-align:center}

input,textarea,select{
  width:100%; padding:12px 16px; border:1.5px solid #e0d8d0;
  border-radius:12px; font-size:1rem; font-family:inherit;
  background:#fafaf8; transition:.2s;
}
input:focus,textarea:focus,select:focus{
  outline:none; border-color:#8b1a1a; background:#fff;
}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:.85rem;font-weight:600;color:#666;margin:14px 0 6px}

.search-bar{display:flex; gap:8px; margin-bottom:16px}
.search-bar input{flex:1}

.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.stat{
  flex:1; min-width:80px; background:#fff; border-radius:12px;
  padding:14px; text-align:center; box-shadow: 0 1px 6px rgba(0,0,0,.04);
}
.stat .num{font-size:1.5rem;font-weight:700;color:#8b1a1a}
.stat .label{font-size:.75rem;color:#999;margin-top:4px}

.modal-overlay{
  display:none; position:fixed; top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.4); z-index:100; justify-content:center;
  align-items:center; padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  background:#fff; border-radius:20px; padding:24px; width:100%;
  max-width:360px; text-align:center;
}
.modal h3{margin-bottom:12px}
.modal .btn{margin:6px}

.fab{
  position:fixed; bottom:24px; right:24px; width:56px; height:56px;
  border-radius:50%; background:#8b1a1a; color:#fff; border:none;
  font-size:1.8rem; cursor:pointer; box-shadow: 0 4px 16px rgba(139,26,26,.4);
  z-index:20; display:flex; align-items:center; justify-content:center;
  transition:.2s;
}
.fab:active{transform:scale(.9)}

.empty{text-align:center;padding:40px 20px;color:#bbb}
.empty .icon{font-size:3rem;margin-bottom:12px}

/* 表单分组 - 成语专用字段 */
.form-group{display:block}
.form-group.hidden{display:none}

/* 复习卡片中的分隔线 */
.divider{
  width:40px; height:3px; background:#e0d8d0; border-radius:2px;
  margin:16px auto;
}
</style>
</head>
<body>

<header><h1>📖 公考成语 · 名句复习</h1></header>

<nav>
  <button class="active" data-page="review">🎲 复习</button>
  <button data-page="add">➕ 添加</button>
  <button data-page="list">📋 全部</button>
  <button data-page="settings">⚙️ 设置</button>
</nav>

<main>
  <!-- 复习页 -->
  <section class="page active" id="page-review">
    <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <select id="reviewFilter" style="flex:1;min-width:120px" onchange="doRandom()">
        <option value="all">全部分类</option>
        <option value="idiom">🐲 成语</option>
        <option value="quote">📜 名句</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="doRandom()">🎲 再来一条</button>
    </div>
    <div id="randomDisplay"></div>
  </section>

  <!-- 添加页 -->
  <section class="page" id="page-add">
    <form id="addForm" onsubmit="addEntry(event)">
      <label>分类</label>
      <select id="addCategory" onchange="onCategoryChange()">
        <option value="idiom">🐲 成语</option>
        <option value="quote">📜 名句</option>
      </select>

      <!-- 成语专用字段 -->
      <div id="fields-idiom" class="form-group">
        <label>成语 *</label>
        <input type="text" id="idiomWord" placeholder="例如：差强人意" required>
        <label>释义 *</label>
        <textarea id="idiomMeaning" placeholder="输入成语的意思和考点..." required></textarea>
      </div>

      <!-- 名句专用字段 -->
      <div id="fields-quote" class="form-group hidden">
        <label>名句原文 *</label>
        <textarea id="quoteText" placeholder="输入名句原文..." required></textarea>
        <label>出处 / 解释</label>
        <textarea id="quoteNote" placeholder="可选：出处、作者、解释..."></textarea>
      </div>

      <button class="btn btn-primary btn-block" style="margin-top:16px" type="submit" id="submitBtn">✅ 添加</button>
    </form>
  </section>

  <!-- 全部列表 -->
  <section class="page" id="page-list">
    <div class="search-bar">
      <input id="searchInput" placeholder="🔍 搜索..." oninput="renderList()">
      <select id="listFilter" onchange="renderList()" style="width:auto;min-width:100px">
        <option value="all">全部分类</option>
        <option value="idiom">成语</option>
        <option value="quote">名句</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="exportData()">📤</button>
    </div>
    <div class="stats" id="statsBar"></div>
    <div id="listDisplay"></div>
  </section>

  <!-- 设置 -->
  <section class="page" id="page-settings">
    <div class="card">
      <h3 style="margin-bottom:12px">📤 导出备份</h3>
      <p style="color:#888;font-size:.85rem;margin-bottom:12px">把所有数据保存为 JSON 文件</p>
      <button class="btn btn-outline btn-block" onclick="exportData()">导出 JSON</button>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px">📥 导入备份</h3>
      <p style="color:#888;font-size:.85rem;margin-bottom:12px">从之前导出的 JSON 文件恢复</p>
      <input type="file" accept=".json" id="importFile" onchange="importData(event)" style="padding:10px">
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px">🗑️ 清空所有数据</h3>
      <p style="color:#c00;font-size:.85rem;margin-bottom:12px">不可恢复，建议先导出备份</p>
      <button class="btn btn-outline btn-block" style="border-color:#c00;color:#c00" onclick="confirmClear()">清空数据</button>
    </div>
  </section>
</main>

<button class="fab" onclick="switchPage('add')" id="fabBtn">+</button>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg" style="color:#666;margin-bottom:16px"></p>
    <button class="btn btn-primary btn-sm" id="modalConfirm">确认</button>
    <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
  </div>
</div>

<script>
// ==================== 数据模型 ====================
// 成语: {cat:'idiom', content:成语, meaning:释义}
// 名句: {cat:'quote',  content:名句, note:出处}
const STORAGE_KEY = 'gk_review_v2';
let entries = [];
let editId = null; // 编辑模式下的条目 id

function load(){
  // 优先读新版，兼容旧版
  let raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){
    // 从旧版迁移
    raw = localStorage.getItem('gk_review_data');
    if(raw){
      try{
        const old = JSON.parse(raw);
        // 迁移旧数据
        entries = old.map(o=>({
          id:o.id, cat:o.cat, content:o.content,
          meaning: o.cat==='idiom' ? (o.note||'') : '',
          note: o.cat==='quote' ? (o.note||'') : '',
          ts:o.ts
        }));
        save();
        localStorage.removeItem('gk_review_data');
        return;
      }catch(e){}
    }
    entries = []; save(); return;
  }
  try{ entries = JSON.parse(raw) || []; }
  catch(e){ entries = []; }

  if(!entries.length){
    entries = [
      {id:1,cat:'idiom',content:'差强人意',meaning:'大体上还能使人满意。\n⚠️ 易错：不是"让人不满意"，恰恰相反。',ts:Date.now()},
      {id:2,cat:'idiom',content:'首当其冲',meaning:'最先受到攻击或遭遇灾难。\n⚠️ 易错：不是"冲在最前面"的意思。',ts:Date.now()},
      {id:3,cat:'idiom',content:'不刊之论',meaning:'不可磨灭、不可更改的言论。\n"刊"是削除，不是"刊登"。比喻不能改动或不可磨灭的言论。',ts:Date.now()},
      {id:4,cat:'idiom',content:'万人空巷',meaning:'家家户户的人都从巷子里出来了，形容庆祝、欢迎等盛况。\n⚠️ 易错：不是"巷子里没人"的冷清。',ts:Date.now()},
      {id:5,cat:'idiom',content:'七月流火',meaning:'农历七月，大火星西沉，天气转凉。\n⚠️ 易错：不是"热得像火一样"。',ts:Date.now()},
      {id:6,cat:'quote',content:'治大国若烹小鲜',note:'《道德经》老子。治理大国要像煎小鱼一样——少翻动，少折腾，顺应自然。',ts:Date.now()},
      {id:7,cat:'quote',content:'为天地立心，为生民立命，为往圣继绝学，为万世开太平',note:'张载"横渠四句"。宋代儒学家的最高理想，常作为申论引用。',ts:Date.now()},
    ];
    save();
  }
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function nextId(){ return entries.length ? Math.max(...entries.map(e=>e.id))+1 : 1; }

// ==================== 分类切换表单 ====================
function onCategoryChange(){
  const cat = document.getElementById('addCategory').value;
  document.getElementById('fields-idiom').classList.toggle('hidden', cat!=='idiom');
  document.getElementById('fields-quote').classList.toggle('hidden', cat!=='quote');
  // 更新必填字段
  document.getElementById('idiomWord').required = (cat==='idiom');
  document.getElementById('idiomMeaning').required = (cat==='idiom');
  document.getElementById('quoteText').required = (cat==='quote');
}

// ==================== UI 切换 ====================
function switchPage(name){
  currentPage = name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-page="${name}"]`).classList.add('active');
  document.getElementById('fabBtn').style.display = (name==='add'||name==='list') ? 'none' : 'flex';

  if(name==='review') doRandom();
  if(name==='list') renderList();
  if(name==='add') resetForm();
}
document.querySelectorAll('nav button').forEach(b=>{
  b.addEventListener('click',()=>switchPage(b.dataset.page));
});

// ==================== 添加/编辑条目 ====================
function addEntry(e){
  e.preventDefault();
  const cat = document.getElementById('addCategory').value;

  let content='', meaning='', note='';
  if(cat==='idiom'){
    content = document.getElementById('idiomWord').value.trim();
    meaning = document.getElementById('idiomMeaning').value.trim();
    if(!content) return showToast('⚠️ 请输入成语');
  } else {
    content = document.getElementById('quoteText').value.trim();
    note = document.getElementById('quoteNote').value.trim();
    if(!content) return showToast('⚠️ 请输入名句');
  }

  if(editId){
    // 编辑模式
    const e = entries.find(x=>x.id===editId);
    if(e){
      e.cat = cat; e.content = content;
      if(cat==='idiom'){ e.meaning = meaning; e.note = ''; }
      else { e.note = note; e.meaning = ''; }
      e.ts = Date.now();
      showToast('✅ 已更新');
    }
  } else {
    entries.push({ id:nextId(), cat, content, meaning, note, ts:Date.now() });
    showToast('✅ 已添加');
  }
  save();
  resetForm();
  // 编辑完后跳列表
  if(editId){ switchPage('list'); }
  editId = null;
}

function resetForm(){
  editId = null;
  document.getElementById('addCategory').value = 'idiom';
  document.getElementById('idiomWord').value = '';
  document.getElementById('idiomMeaning').value = '';
  document.getElementById('quoteText').value = '';
  document.getElementById('quoteNote').value = '';
  onCategoryChange();
  document.getElementById('addForm').onsubmit = function(ev){ addEntry(ev); };
  document.getElementById('submitBtn').textContent = '✅ 添加';
}

// ==================== 随机复习 ====================
function doRandom(){
  const filter = document.getElementById('reviewFilter').value;
  let pool = filter==='all' ? entries : entries.filter(e=>e.cat===filter);
  if(!pool.length){
    document.getElementById('randomDisplay').innerHTML = `
      <div class="card random-card">
        <p style="color:#999">暂无数据，请先添加</p>
        <button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="switchPage('add')">➕ 去添加</button>
      </div>`;
    return;
  }
  const e = pool[Math.floor(Math.random()*pool.length)];

  let bodyHTML = '';
  if(e.cat==='idiom'){
    bodyHTML = `
      <div class="content">🏮 ${e.content}</div>
      <div class="divider"></div>
      <div class="meaning" style="white-space:pre-line">${e.meaning||''}</div>`;
  } else {
    bodyHTML = `
      <div class="content">📜 ${e.content}</div>
      ${e.note ? `<div class="divider"></div><div class="note" style="white-space:pre-line">${e.note}</div>` : ''}`;
  }

  const tagMap = {idiom:'🐲 成语',quote:'📜 名句'};
  const tagCls = {idiom:'tag-idiom',quote:'tag-quote'};

  document.getElementById('randomDisplay').innerHTML = `
    <div class="card random-card" id="currentRandom">
      <span class="tag ${tagCls[e.cat]}">${tagMap[e.cat]}</span>
      ${bodyHTML}
      <div style="margin-top:16px;display:flex;gap:10px;justify-content:center;">
        <button class="btn btn-primary btn-sm" onclick="doRandom()">🔄 再来一条</button>
        <button class="btn btn-outline btn-sm" onclick="deleteEntry(${e.id})">🗑️</button>
      </div>
    </div>`;
}

// ==================== 列表 ====================
var currentPage = 'review'; // 放在前面

function renderList(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const filter = document.getElementById('listFilter').value;
  let list = entries;
  if(filter!=='all') list = list.filter(e=>e.cat===filter);
  if(q) list = list.filter(e=>
    e.content.includes(q) || (e.meaning||'').includes(q) || (e.note||'').includes(q)
  );
  list.sort((a,b)=>b.ts-a.ts);

  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num">${entries.length}</div><div class="label">总计</div></div>
    <div class="stat"><div class="num">${entries.filter(e=>e.cat==='idiom').length}</div><div class="label">🐲 成语</div></div>
    <div class="stat"><div class="num">${entries.filter(e=>e.cat==='quote').length}</div><div class="label">📜 名句</div></div>
  `;

  if(!list.length){
    document.getElementById('listDisplay').innerHTML = '<div class="empty"><div class="icon">📭</div><p>暂无数据</p></div>';
    return;
  }

  document.getElementById('listDisplay').innerHTML = list.map(e=>{
    let body = '';
    if(e.cat==='idiom'){
      body = `<div class="content">🏮 ${e.content}</div>
        ${e.meaning ? `<div class="note" style="white-space:pre-line">${e.meaning}</div>` : ''}`;
    } else {
      body = `<div class="content">📜 ${e.content}</div>
        ${e.note ? `<div class="note" style="white-space:pre-line">${e.note}</div>` : ''}`;
    }
    return `<div class="card">
      <span class="tag ${e.cat==='idiom'?'tag-idiom':'tag-quote'}">${e.cat==='idiom'?'🐲 成语':'📜 名句'}</span>
      ${body}
      <div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="editEntry(${e.id})">✏️ 编辑</button>
        <button class="btn btn-outline btn-sm" style="border-color:#c00;color:#c00" onclick="deleteEntry(${e.id})">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

// ==================== 编辑 ====================
function editEntry(id){
  const e = entries.find(x=>x.id===id);
  if(!e) return;
  editId = id;
  switchPage('add');
  document.getElementById('addCategory').value = e.cat;
  if(e.cat==='idiom'){
    document.getElementById('idiomWord').value = e.content||'';
    document.getElementById('idiomMeaning').value = e.meaning||'';
  } else {
    document.getElementById('quoteText').value = e.content||'';
    document.getElementById('quoteNote').value = e.note||'';
  }
  onCategoryChange();
  document.getElementById('submitBtn').textContent = '💾 保存修改';
  showToast('修改后点击"保存修改"');
}

// ==================== 删除 ====================
function deleteEntry(id){
  const e = entries.find(x=>x.id===id);
  if(!e) return;
  const label = e.cat==='idiom' ? `成语「${e.content}」` : `名句「${e.content.slice(0,20)}...」`;
  showModal('确认删除', `确定删除 ${label} ？`, ()=>{
    entries = entries.filter(x=>x.id!==id);
    save();
    if(currentPage==='review') doRandom();
    if(currentPage==='list') renderList();
  });
}

// ==================== 导出导入 ====================
function exportData(){
  const blob = new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '公考复习备份_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('📤 已导出');
}
function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  showModal('导入备份', '导入将覆盖当前所有数据，确认？', ()=>{
    const reader = new FileReader();
    reader.onload = function(){
      try{
        const data = JSON.parse(reader.result);
        if(!Array.isArray(data)) throw new Error();
        entries = data;
        save();
        if(currentPage==='review') doRandom();
        if(currentPage==='list') renderList();
        showToast('📥 导入成功，共 '+data.length+' 条');
      }catch(e){ showToast('❌ 文件格式不对'); }
    };
    reader.readAsText(file);
  });
  event.target.value = '';
}

// ==================== 清空 ====================
function confirmClear(){
  showModal('清空数据', '数据将被永久删除，不可恢复。建议先导出备份。确定继续？', ()=>{
    entries = [];
    save();
    if(currentPage==='review') doRandom();
    if(currentPage==='list') renderList();
    showToast('已清空');
  });
}

// ==================== 弹窗 ====================
let modalCallback = null;
function showModal(title, msg, onConfirm){
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalMsg').textContent = msg;
  document.getElementById('modal').classList.add('show');
  modalCallback = onConfirm;
}
document.getElementById('modalConfirm').addEventListener('click',()=>{
  document.getElementById('modal').classList.remove('show');
  if(modalCallback) modalCallback();
  modalCallback = null;
});
document.getElementById('modalCancel').addEventListener('click',()=>{
  document.getElementById('modal').classList.remove('show');
  modalCallback = null;
});

// ==================== Toast ====================
function showToast(msg){
  let t = document.getElementById('toast');
  if(!t){
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2c2416;color:#fff;padding:12px 28px;border-radius:25px;font-size:.9rem;z-index:200;transition:.3s;opacity:0;pointer-events:none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._tid);
  t._tid = setTimeout(()=>{ t.style.opacity='0'; }, 2000);
}

// ==================== 初始化 ====================
load();
onCategoryChange();
doRandom();
</script>
