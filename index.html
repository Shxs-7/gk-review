<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="复习">
<title>公考复习</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background:#f8f9fa; color:#333; min-height:100dvh;
  overflow-x:hidden;
}
nav{
  display:flex; background:#fff; position:sticky; top:0; z-index:9;
  border-bottom:1px solid #eee;
}
nav button{
  flex:1; padding:12px 8px; border:none; background:transparent;
  color:#888; font-size:.85rem; cursor:pointer; border-bottom:2px solid transparent;
  transition:.2s;
}
nav button.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:500}
main{padding:16px;max-width:700px;margin:0 auto}
.page{display:none}
.page.active{display:block}

.card{
  background:#fff; border-radius:12px; padding:20px 18px;
  margin-bottom:12px; border:1px solid #eee;
}
.tag{display:inline-block;padding:2px 10px;border-radius:10px;font-size:.7rem;margin-bottom:8px}
.tag-idiom{background:#e8f0fe;color:#2563eb}
.tag-quote{background:#e8f0fe;color:#2563eb}
.tag-mastered{background:#e8fce8;color:#1a7a1a}
.tag-unmastered{background:#fef3e0;color:#b85c00}

.btn{
  display:inline-block;padding:10px 24px;border:none;border-radius:8px;
  font-size:.9rem;cursor:pointer;transition:.2s;font-weight:500;
}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:active{background:#1d4ed8}
.btn-outline{background:transparent;border:1.5px solid #2563eb;color:#2563eb}
.btn-outline:active{background:#eef3ff}
.btn-sm{padding:6px 14px;font-size:.8rem;border-radius:6px}
.btn-block{display:block;width:100%;text-align:center}
.btn-green{background:#16a34a;color:#fff}
.btn-green:active{background:#15803d}
.btn-orange{background:#ea580c;color:#fff}
.btn-orange:active{background:#c2410c}

input,textarea,select{
  width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:8px;
  font-size:.95rem;font-family:inherit;background:#fff;transition:.2s;
}
input:focus,textarea:focus,select:focus{outline:none;border-color:#2563eb}
textarea{resize:vertical;min-height:80px}
label{display:block;font-size:.8rem;font-weight:500;color:#666;margin:12px 0 5px}

.search-bar{display:flex;gap:8px;margin-bottom:14px}
.search-bar input{flex:1}

.stats{display:flex;gap:10px;margin-bottom:14px}
.stat{
  flex:1;background:#fff;border-radius:10px;padding:12px;
  text-align:center;border:1px solid #eee;
}
.stat .num{font-size:1.3rem;font-weight:600;color:#2563eb}
.stat .label{font-size:.7rem;color:#999;margin-top:3px}

.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.35);z-index:100;justify-content:center;
  align-items:center;padding:20px;
}
.modal-overlay.show{display:flex}
.modal{
  background:#fff;border-radius:14px;padding:24px;width:100%;
  max-width:340px;text-align:center;
}
.modal h3{margin-bottom:10px;font-weight:500}
.modal .btn{margin:5px}

.fab{
  position:fixed;bottom:24px;right:24px;width:52px;height:52px;
  border-radius:50%;background:#2563eb;color:#fff;border:none;
  font-size:1.6rem;cursor:pointer;z-index:20;
  display:flex;align-items:center;justify-content:center;transition:.2s;
}
.fab:active{transform:scale(.9)}

.fab-cam{
  bottom:88px; background:#16a34a;
}

.empty{text-align:center;padding:40px 20px;color:#bbb}
.empty .icon{font-size:2.5rem;margin-bottom:10px}

.form-group{display:block}
.form-group.hidden{display:none}

hr.divider{width:30px;margin:14px auto;border:none;border-top:2px solid #e2e8f0}

/* ============ 翻转卡片 ============ */
.flip-container{
  perspective:1000px;
  margin-bottom:12px;
}
.flip-card{
  position:relative; min-height:200px;
  transition:transform .4s ease;
  transform-style:preserve-3d;
}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-face{
  position:absolute; top:0; left:0; width:100%; min-height:200px;
  background:#fff; border-radius:12px; padding:36px 20px;
  border:1px solid #eee; text-align:center;
  backface-visibility:hidden;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
}
.flip-front{ z-index:2; cursor:pointer; }
.flip-back{ transform:rotateY(180deg); }
.flip-front .content{font-size:1.6rem;color:#1e293b;margin-bottom:8px}
.flip-front .hint{font-size:.75rem;color:#bbb;margin-top:12px}
.flip-back .content{font-size:1.05rem;color:#2563eb;line-height:1.8;white-space:pre-line}

/* OCR loading */
.spinner{
  display:inline-block; width:20px; height:20px; border:2px solid #e2e8f0;
  border-top-color:#2563eb; border-radius:50%; animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.ocr-result{max-height:200px;overflow-y:auto}
.ocr-result label{
  display:flex; align-items:flex-start; gap:8px; cursor:pointer;
  padding:8px 0; border-bottom:1px solid #f0f0f0;
  font-weight:400; color:#333; margin:0; font-size:.9rem;
}
.ocr-result input{margin-top:4px; width:auto}

/* Chat */
.chat-area{display:flex;flex-direction:column;height:calc(100dvh - 52px)}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 0}
.chat-msg{display:flex;margin-bottom:12px}
.chat-msg.user{justify-content:flex-end}
.chat-msg.ai{justify-content:flex-start}
.chat-bubble{max-width:85%;padding:10px 14px;border-radius:16px;font-size:.9rem;line-height:1.6;white-space:pre-line}
.chat-msg.user .chat-bubble{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.chat-msg.ai .chat-bubble{background:#f1f5f9;color:#333;border-bottom-left-radius:4px}
.chat-input-row{display:flex;gap:8px;padding:10px 0;border-top:1px solid #eee;background:#fff}
.chat-input-row input{flex:1}
.chat-empty{text-align:center;padding:60px 20px;color:#bbb}
.chat-empty .icon{font-size:3rem;margin-bottom:12px}
</style>
</head>
<body>

<nav>
  <button class="active" data-page="review">复习</button>
  <button data-page="add">添加</button>
  <button data-page="list">列表</button>
  <button data-page="search">查询</button>
  <button data-page="chat">聊天</button>
  <button data-page="settings">设置</button>
</nav>

<main>
  <!-- 复习页 -->
  <section class="page active" id="page-review">
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <select id="reviewFilter" style="flex:1" onchange="doRandom()">
        <option value="all">全部</option>
        <option value="idiom">成语</option>
        <option value="quote">名句</option>
        <option value="unmastered">未掌握</option>
      </select>
      <button class="btn btn-primary btn-sm" onclick="doRandom()">随机</button>
    </div>
    <div id="randomDisplay"></div>
    <div style="text-align:center;margin-top:20px">
      <a href="http://www.people.com.cn" target="_blank" class="btn btn-outline btn-sm">📰 人民网</a>
    </div>
  </section>

  <!-- 添加页 -->
  <section class="page" id="page-add">
    <form id="addForm" onsubmit="addEntry(event)">
      <label>分类</label>
      <select id="addCategory" onchange="onCategoryChange()">
        <option value="idiom">成语</option>
        <option value="quote">名句</option>
      </select>

      <div id="fields-idiom" class="form-group">
        <label>成语</label>
        <input type="text" id="idiomWord" placeholder="例如：差强人意" required>
        <label>释义</label>
        <textarea id="idiomMeaning" placeholder="成语的意思和考点..." required></textarea>
      </div>

      <div id="fields-quote" class="form-group hidden">
        <label>名句原文</label>
        <textarea id="quoteText" placeholder="输入名句原文..." required></textarea>
        <label>出处 / 解释</label>
        <textarea id="quoteNote" placeholder="可选"></textarea>
      </div>

      <button class="btn btn-primary btn-block" style="margin-top:14px" type="submit" id="submitBtn">添加</button>
    </form>
  </section>

  <!-- 列表页 -->
  <section class="page" id="page-list">
    <div class="search-bar">
      <input id="searchInput" placeholder="搜索..." oninput="renderList()">
      <select id="listFilter" onchange="renderList()" style="width:auto;min-width:80px">
        <option value="all">全部</option>
        <option value="idiom">成语</option>
        <option value="quote">名句</option>
        <option value="mastered">已掌握</option>
        <option value="unmastered">未掌握</option>
      </select>
    </div>
    <div class="stats" id="statsBar"></div>
    <div id="listDisplay"></div>
  </section>

  <!-- 查询页 -->
  <section class="page" id="page-search">
    <div style="margin-bottom:14px">
      <input type="text" id="searchQuery" placeholder="输入成语或关键词搜索..." oninput="doSearch()">
    </div>
    <div id="searchResult"></div>
    <div style="text-align:center;margin-top:20px">
      <a href="http://www.people.com.cn" target="_blank" class="btn btn-outline btn-sm">📰 人民网</a>
    </div>
  </section>

  <!-- 聊天页 -->
  <section class="page" id="page-chat">
    <div class="chat-area">
      <div class="chat-msgs" id="chatMsgs">
        <div class="chat-empty"><div class="icon">💬</div><p>AI 学习助手</p><p style="font-size:.8rem">提问公考相关问题</p></div>
      </div>
      <input type="file" accept="image/*" capture="environment" id="chatImgInput" onchange="handleChatImage(event)" style="display:none">
      <div class="chat-input-row" style="padding:8px 16px">
        <button class="btn btn-outline btn-sm" onclick="document.getElementById('chatImgInput').click()" style="font-size:1.2rem">📷</button>
        <input type="text" id="chatInput" placeholder="输入问题或拍照识别题目..." onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn btn-primary btn-sm" onclick="sendChat()">发送</button>
      </div>
    </div>
  </section>

  <!-- 设置页 -->
  <section class="page" id="page-settings">
    <div class="card" style="text-align:center">
      <div class="stat" style="border:0;display:inline-block;min-width:auto">
        <div class="num" id="storageSize">-</div>
        <div class="label">已用空间</div>
      </div>
      <div class="stat" style="border:0;display:inline-block;min-width:auto">
        <div class="num" id="entryCount">0</div>
        <div class="label">数据条数</div>
      </div>
      <div class="stat" style="border:0;display:inline-block;min-width:auto">
        <div class="num" id="masteredCount">0</div>
        <div class="label">已掌握</div>
      </div>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px;font-weight:500;font-size:1rem">批量导入</h3>
      <p style="color:#888;font-size:.8rem;margin-bottom:8px">每行一条，格式：成语|释义</p>
      <textarea id="batchInput" placeholder="差强人意|大体上还能使人满意
首当其冲|最先受到攻击或遭遇灾难
为天地立心|张载"横渠四句""></textarea>
      <div style="display:flex;gap:8px;margin-top:8px">
        <select id="batchCategory" style="width:auto">
          <option value="idiom">导入为成语</option>
          <option value="quote">导入为名句</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="batchImport()">导入</button>
      </div>
      <p id="batchResult" style="font-size:.75rem;color:#16a34a;margin-top:6px"></p>
    </div>

    <div class="card">
      <h3 style="margin-bottom:8px;font-weight:500;font-size:1rem">DeepSeek API Key</h3>
      <p style="color:#888;font-size:.8rem;margin-bottom:8px">AI 智能解析成语，仅存你手机本地</p>
      <select id="apiModelSelect" style="margin-bottom:8px">
        <option value="deepseek-chat">DeepSeek V4 Pro (1M 上下文)</option>
        <option value="deepseek-reasoner">DeepSeek R1 (推理增强)</option>
      </select>
      <input type="password" id="apiKeyInput" placeholder="sk-..." style="margin-bottom:8px">
      <button class="btn btn-primary btn-sm" onclick="saveApiKey()">保存</button>
      <span id="apiKeyStatus" style="font-size:.75rem;color:#16a34a;margin-left:8px"></span>
    </div>
    <div class="card">
      <h3 style="margin-bottom:8px;font-weight:500;font-size:1rem">导出备份</h3>
      <p style="color:#888;font-size:.8rem;margin-bottom:12px">保存为 JSON 文件</p>
      <button class="btn btn-outline btn-block" onclick="exportData()">导出</button>
    </div>
    <div class="card">
      <h3 style="margin-bottom:8px;font-weight:500;font-size:1rem">导入备份</h3>
      <p style="color:#888;font-size:.8rem;margin-bottom:12px">从 JSON 文件恢复</p>
      <input type="file" accept=".json" id="importFile" onchange="importData(event)" style="font-size:.85rem">
    </div>
    <div class="card">
      <h3 style="margin-bottom:8px;font-weight:500;font-size:1rem">清空数据</h3>
      <p style="color:#999;font-size:.8rem;margin-bottom:12px">不可恢复</p>
      <button class="btn btn-outline btn-block" style="border-color:#e2e8f0;color:#999" onclick="confirmClear()">清空</button>
    </div>
  </section>

  <!-- OCR 弹窗 -->
  <div class="modal-overlay" id="ocrModal">
    <div class="modal" style="max-width:90vw">
      <h3>相机识别</h3>
      <input type="file" accept="image/*" capture="environment" id="ocrInput" onchange="runOCR(event)" style="font-size:.85rem;margin-bottom:12px">
      <div id="ocrStatus"></div>
      <div class="ocr-result" id="ocrResult"></div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <select id="ocrCategory" style="width:auto">
          <option value="idiom">添加为成语</option>
          <option value="quote">添加为名句</option>
        </select>
        <button class="btn btn-primary btn-sm" id="ocrAddBtn" onclick="addOCRSelection()">添加选中</button>
      </div>
      <p id="ocrMsg" style="font-size:.75rem;color:#16a34a;margin-top:6px"></p>
      <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="closeOCR()">关闭</button>
    </div>
  </div>
</main>

<!-- 浮动按钮 -->
<button class="fab" onclick="switchPage('add')" id="fabBtn">+</button>
<button class="fab fab-cam" onclick="openOCR()" id="camBtn">📷</button>

<!-- 确认弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalMsg" style="color:#666;margin-bottom:14px;font-size:.9rem"></p>
    <button class="btn btn-primary btn-sm" id="modalConfirm">确认</button>
    <button class="btn btn-outline btn-sm" id="modalCancel">取消</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script>
// ==================== 数据模型 ====================
// {cat, content, meaning, note, mastered:false, reviewCount:0, lastReview:null, ts}
const STORAGE_KEY = 'gk_review_v3';
let entries = [], editId = null;

function migrate(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(raw){try{entries=JSON.parse(raw); return;}catch(e){}}
  // 兼容旧版
  const old = localStorage.getItem('gk_review_v2') || localStorage.getItem('gk_review_data');
  if(old){ try{
    entries = JSON.parse(old).map(o=>({...o, mastered:o.mastered||false, reviewCount:o.reviewCount||0, lastReview:o.lastReview||null}));
    save(); localStorage.removeItem('gk_review_v2'); localStorage.removeItem('gk_review_data');
    return;
  }catch(e){}}
  entries = []; save();
}
function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
function nextId(){ return entries.length ? Math.max(...entries.map(e=>e.id))+1 : 1; }

function seedData(){
  if(entries.length) return;
  entries = [
    {id:1,cat:'idiom',content:'差强人意',meaning:'大体上还能使人满意。\n⚠ 易错：不是"让人不满意"。',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()},
    {id:2,cat:'idiom',content:'首当其冲',meaning:'最先受到攻击或遭遇灾难。\n⚠ 易错：不是"冲在最前面"。',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()},
    {id:3,cat:'idiom',content:'不刊之论',meaning:'不可磨灭的言论。"刊"是削除，不是"刊登"。',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()},
    {id:4,cat:'idiom',content:'万人空巷',meaning:'家家户户的人都出来了，形容盛况。\n⚠ 易错：不是"巷子空了"。',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()},
    {id:5,cat:'idiom',content:'七月流火',meaning:'农历七月大火星西沉，天气转凉。\n⚠ 易错：不是"热得像火"。',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()},
    {id:6,cat:'quote',content:'治大国若烹小鲜',note:'《道德经》老子。治理大国像煎小鱼，少翻动，顺应自然。',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()},
    {id:7,cat:'quote',content:'为天地立心，为生民立命，为往圣继绝学，为万世开太平',note:'张载"横渠四句"。宋代儒学最高理想，常作申论引用。',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()},
  ];
  save();
}

// ==================== 分类切换 ====================
function onCategoryChange(){
  const cat = document.getElementById('addCategory').value;
  document.getElementById('fields-idiom').classList.toggle('hidden',cat!=='idiom');
  document.getElementById('fields-quote').classList.toggle('hidden',cat!=='quote');
  document.getElementById('idiomWord').required = (cat==='idiom');
  document.getElementById('idiomMeaning').required = (cat==='idiom');
  document.getElementById('quoteText').required = (cat==='quote');
}

// ==================== UI 切换 ====================
function switchPage(name){
  currentPage = name;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-page="${name}"]`).classList.add('active');
  document.getElementById('fabBtn').style.display = (name==='add'||name==='list')?'none':'flex';
  document.getElementById('camBtn').style.display = (name==='add')?'flex':'none';
  document.getElementById('fabBtn').style.display = (name==='add'||name==='list'||name==='search'||name==='chat')?'none':'flex';
  if(name==='review') doRandom();
  if(name==='list') renderList();
  if(name==='add') resetForm();
  if(name==='settings'){ showStorage(); loadApiKey(); }
  if(name==='search'){ document.getElementById('searchQuery').value=''; document.getElementById('searchResult').innerHTML=''; }
}
document.querySelectorAll('nav button').forEach(b=>{
  b.addEventListener('click',()=>switchPage(b.dataset.page));
});

// ==================== 添加 ====================
function addEntry(e){
  e.preventDefault();
  const cat = document.getElementById('addCategory').value;
  let content='', meaning='', note='';
  if(cat==='idiom'){
    content = document.getElementById('idiomWord').value.trim();
    meaning = document.getElementById('idiomMeaning').value.trim();
    if(!content) return showToast('请输入成语');
  } else {
    content = document.getElementById('quoteText').value.trim();
    note = document.getElementById('quoteNote').value.trim();
    if(!content) return showToast('请输入名句');
  }
  if(editId){
    const ex = entries.find(x=>x.id===editId);
    if(ex){
      ex.cat=cat;ex.content=content;
      if(cat==='idiom'){ex.meaning=meaning;ex.note='';}
      else{ex.note=note;ex.meaning='';}
      ex.ts=Date.now();
      showToast('已更新');
    }
  } else {
    entries.push({id:nextId(),cat,content,meaning,note,mastered:false,reviewCount:0,lastReview:null,ts:Date.now()});
    showToast('已添加');
  }
  save(); resetForm();
  if(editId) switchPage('list');
  editId=null;
}

function resetForm(){
  editId=null;
  document.getElementById('addCategory').value='idiom';
  document.getElementById('idiomWord').value='';
  document.getElementById('idiomMeaning').value='';
  document.getElementById('quoteText').value='';
  document.getElementById('quoteNote').value='';
  onCategoryChange();
  document.getElementById('submitBtn').textContent='添加';
}

// ==================== 批量导入 ====================
function batchImport(){
  const raw = document.getElementById('batchInput').value.trim();
  const cat = document.getElementById('batchCategory').value;
  if(!raw) return;
  const lines = raw.split('\n').filter(l=>l.trim());
  let added = 0;
  lines.forEach(line=>{
    const parts = line.split('|');
    const content = (parts[0]||'').trim();
    const extra = (parts[1]||'').trim();
    if(!content) return;
    if(cat==='idiom'){
      entries.push({id:nextId(),cat:'idiom',content,meaning:extra,note:'',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()});
    } else {
      entries.push({id:nextId(),cat:'quote',content,note:extra,meaning:'',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()});
    }
    added++;
  });
  save();

// ==================== 翻转复习 ====================
let currentCardId = null;

function doRandom(){
  const filter = document.getElementById('reviewFilter').value;
  let pool = entries;
  if(filter==='idiom') pool = entries.filter(e=>e.cat==='idiom');
  else if(filter==='quote') pool = entries.filter(e=>e.cat==='quote');
  else if(filter==='unmastered') pool = entries.filter(e=>!e.mastered);

  if(!pool.length){
    document.getElementById('randomDisplay').innerHTML = `
      <div class="card" style="text-align:center;padding:36px"><p style="color:#999">暂无数据</p>
      <button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="switchPage('add')">去添加</button></div>`;
    return;
  }

  // 加权排序：未掌握优先，复习次数少的优先
  pool.sort((a,b)=>{
    if(a.mastered!==b.mastered) return a.mastered ? 1 : -1;
    return a.reviewCount - b.reviewCount;
  });
  // 前50%加权随机
  const top = pool.slice(0, Math.max(Math.floor(pool.length*0.5), 1));
  const e = top[Math.floor(Math.random()*top.length)];
  currentCardId = e.id;

  const showMeaning = e.cat==='idiom'?e.meaning:e.note;
  document.getElementById('randomDisplay').innerHTML = `
    <div class="flip-container" onclick="flipCard()">
      <div class="flip-card" id="flipCard">
        <div class="flip-face flip-front">
          <span class="tag tag-idiom">${e.cat==='idiom'?'成语':'名句'}</span>
          <div class="content">${e.content}</div>
          <div class="hint">👆 点击翻转看答案</div>
        </div>
        <div class="flip-face flip-back">
          <span class="tag tag-idiom">${e.cat==='idiom'?'释义':'出处'}</span>
          <div class="content">${showMeaning||'(无)'}</div>
        </div>
      </div>
    </div>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button class="btn btn-green btn-sm" onclick="markMastered(${e.id},true)">记住了</button>
      <button class="btn btn-orange btn-sm" onclick="markMastered(${e.id},false)">没记住</button>
      <button class="btn btn-outline btn-sm" onclick="doRandom()">跳过</button>
    </div>
    <div style="text-align:center;margin-top:6px">
      <span class="tag ${e.mastered?'tag-mastered':'tag-unmastered'}">${e.mastered?'已掌握':'未掌握'}</span>
      <span style="font-size:.7rem;color:#bbb;margin-left:6px">复习 ${e.reviewCount} 次</span>
    </div>`;
}

function flipCard(){
  document.getElementById('flipCard').classList.toggle('flipped');
}

function markMastered(id, mastered){
  const e = entries.find(x=>x.id===id);
  if(e){
    e.mastered = mastered;
    e.reviewCount = (e.reviewCount||0)+1;
    e.lastReview = Date.now();
    save();
  }
  doRandom();
}

var currentPage = 'review';

function renderList(){
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const filter = document.getElementById('listFilter').value;
  let list = entries;
  if(filter==='idiom') list = list.filter(e=>e.cat==='idiom');
  else if(filter==='quote') list = list.filter(e=>e.cat==='quote');
  else if(filter==='mastered') list = list.filter(e=>e.mastered);
  else if(filter==='unmastered') list = list.filter(e=>!e.mastered);
  if(q) list = list.filter(e=>e.content.includes(q)||(e.meaning||'').includes(q)||(e.note||'').includes(q));
  list.sort((a,b)=>b.ts-a.ts);

  const mastered = entries.filter(e=>e.mastered).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><div class="num">${entries.length}</div><div class="label">总计</div></div>
    <div class="stat"><div class="num">${entries.filter(e=>e.cat==='idiom').length}</div><div class="label">成语</div></div>
    <div class="stat"><div class="num">${entries.filter(e=>e.cat==='quote').length}</div><div class="label">名句</div></div>
    <div class="stat"><div class="num">${mastered}</div><div class="label">已掌握</div></div>`;

  if(!list.length){
    document.getElementById('listDisplay').innerHTML = '<div class="empty"><p>暂无数据</p></div>';
    return;
  }

  document.getElementById('listDisplay').innerHTML = list.map(e=>{
    let body = e.cat==='idiom'
      ? `<div class="content">${e.content}</div>${e.meaning?`<div class="note" style="white-space:pre-line">${e.meaning}</div>`:''}`
      : `<div class="content">${e.content}</div>${e.note?`<div class="note" style="white-space:pre-line">${e.note}</div>`:''}`;
    return `<div class="card">
      <span class="tag tag-idiom">${e.cat==='idiom'?'成语':'名句'}</span>
      <span class="tag ${e.mastered?'tag-mastered':'tag-unmastered'}">${e.mastered?'已掌握':'未掌握'}</span>
      ${body}
      <div style="margin-top:8px;display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="editEntry(${e.id})">编辑</button>
        <button class="btn btn-outline btn-sm" onclick="toggleMastered(${e.id})">${e.mastered?'标为未掌握':'标为已掌握'}</button>
        <button class="btn btn-outline btn-sm" style="border-color:#e2e8f0;color:#999" onclick="deleteEntry(${e.id})">删除</button>
      </div></div>`;
  }).join('');
}

function toggleMastered(id){
  const e = entries.find(x=>x.id===id);
  if(e){ e.mastered = !e.mastered; save(); renderList(); }
}

function editEntry(id){ /* 同上 */ const e=entries.find(x=>x.id===id);if(!e)return;editId=id;switchPage('add');document.getElementById('addCategory').value=e.cat;if(e.cat==='idiom'){document.getElementById('idiomWord').value=e.content||'';document.getElementById('idiomMeaning').value=e.meaning||'';}else{document.getElementById('quoteText').value=e.content||'';document.getElementById('quoteNote').value=e.note||'';}onCategoryChange();document.getElementById('submitBtn').textContent='保存';showToast('修改后点击保存');}

let searchTimer = null;
function doSearch(){
  clearTimeout(searchTimer);
  searchTimer = setTimeout(_doSearch, 300);
}
function _doSearch(){
  const q = (document.getElementById('searchQuery').value||'').trim();
  if(!q){ document.getElementById('searchResult').innerHTML=''; return; }
  document.getElementById('searchResult').innerHTML = '<div class="card" style="text-align:center;padding:20px"><div class="spinner"></div><p style="color:#999;margin-top:6px">查询中...</p></div>';
  _doSearchAsync(q);
}
async function _doSearchAsync(q){
  let html = '';
  // 1. check dictionary
  const dictKey = Object.keys(DICT).find(k=>k.includes(q)||q.includes(k));
  if(dictKey){
    html += '<div class="card"><span class="tag tag-idiom">📖 '+dictKey+'（词典）</span><div class="note" style="white-space:pre-line;line-height:1.9">'+DICT[dictKey]+'</div></div>';
  }
  // 2. check local
  const matched = entries.filter(e=>
    e.content.includes(q) || (e.meaning||'').includes(q) || (e.note||'').includes(q)
  );
  if(matched.length){
    html += '<div style="font-size:.8rem;color:#888;margin-bottom:8px">本地笔记 '+matched.length+' 条</div>';
    html += matched.map(e=>{
      let body = e.cat==='idiom'
        ? '<div class="content" style="font-size:1.1rem">'+escHtml(e.content)+'</div>'+(e.meaning?'<div class="note" style="white-space:pre-line">'+escHtml(e.meaning)+'</div>':'')
        : '<div class="content" style="font-size:1.1rem">'+escHtml(e.content)+'</div>'+(e.note?'<div class="note" style="white-space:pre-line">'+escHtml(e.note)+'</div>':'');
      return '<div class="card"><span class="tag tag-idiom">'+(e.cat==='idiom'?'成语':'名句')+'</span>'+body+'</div>';
    }).join('');
  }
  // 3. call DeepSeek API
  if(apiKey){
    try{
      const resp = await fetch('https://api.deepseek.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
        body:JSON.stringify({
          model:apiModel,
          messages:[{role:'system',content:'你是公考辅导专家。用户查询成语或名句时，按以下格式回答：\n【释义】简明解释\n【公考考点】在行测/申论中的考察方式及易混辨析\n【词性及用法】词性、感情色彩、常见搭配\n【真题示例】涉及该词的真题案例（如有）\n回答简洁，总字数300字内。'},
                    {role:'user',content:q}],
          max_tokens:600,
          temperature:0.3
        })
      });
      const data = await resp.json();
      if(data.choices && data.choices[0]){
        const aiText = data.choices[0].message.content;
        const hasSaved = entries.find(e=>e.content===q);
        const saveBtn = hasSaved
          ? '<span style="font-size:.75rem;color:#16a34a">✅ 已保存</span>'
          : '<button class="btn btn-green btn-sm" onclick="saveAIResult(this)">📥 保存到笔记</button>';
        html += '<div class="card" id="aiCard"><span class="tag tag-idiom">🤖 AI 解析</span><div class="note" style="white-space:pre-line;line-height:1.9">'+escHtml(aiText)+'</div><div style="text-align:right;margin-top:10px">'+saveBtn+'</div></div>';
        window._aiQuery = q;
        window._aiText = aiText;
      }
    }catch(e){}
  }
  // 4. fallback links
  if(!html.includes('📖') && !html.includes('🤖')){
    const enc = encodeURIComponent(q);
    html += '<div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px"><a href="https://baike.baidu.com/item/'+enc+'" target="_blank" class="btn btn-outline btn-sm">📘 百科</a><a href="https://hanyu.baidu.com/s?wd='+enc+'" target="_blank" class="btn btn-outline btn-sm">📖 汉语</a><a href="https://www.zdic.net/hans/'+enc+'" target="_blank" class="btn btn-outline btn-sm">📚 汉典</a></div>';
  }
  document.getElementById('searchResult').innerHTML = html;
}

function saveAIResult(btn){
  const q = window._aiQuery || '';
  const aiText = window._aiText || '';
  if(!q || !aiText) return;

  // 去重
  if(entries.find(e=>e.content===q)){
    showToast('已存在，跳过');
    return;
  }

  // 解析 AI 各部分
  const parse = (text, label)=>{
    const re = new RegExp('【'+label+'】([\\s\\S]*?)(?=【|$)','i');
    const m = text.match(re);
    return m ? m[1].trim() : '';
  };
  const meaning = parse(aiText,'释义');
  const exam = parse(aiText,'公考考点');
  const usage = parse(aiText,'词性及用法');
  const real = parse(aiText,'真题示例');

  // 组装完整释义
  let fullMeaning = '';
  if(meaning) fullMeaning += '【释义】\n'+meaning+'\n';
  if(exam) fullMeaning += '\n【公考考点】\n'+exam+'\n';
  if(usage) fullMeaning += '\n【词性及用法】\n'+usage+'\n';
  if(real) fullMeaning += '\n【真题示例】\n'+real+'\n';
  if(!fullMeaning) fullMeaning = aiText;

  entries.push({
    id:nextId(),
    cat:'idiom',
    content:q,
    meaning:fullMeaning.trim(),
    note:'',
    mastered:false,
    reviewCount:0,
    lastReview:null,
    ts:Date.now()
  });
  save();
  showToast('已保存：'+q);
  if(btn) btn.outerHTML = '<span style="font-size:.75rem;color:#16a34a">✅ 已保存</span>';
}

function deleteEntry(id){ const e=entries.find(x=>x.id===id);if(!e)return;const label=e.cat==='idiom'?`成语「${e.content}」`:`名句「${e.content.slice(0,20)}...」`;showModal('确认删除',`删除 ${label}？`,()=>{entries=entries.filter(x=>x.id!==id);save();if(currentPage==='review')doRandom();if(currentPage==='list')renderList();});}

// ==================== OCR 相机识别 ====================
function openOCR(){
  document.getElementById('ocrModal').classList.add('show');
  document.getElementById('ocrResult').innerHTML='';
  document.getElementById('ocrStatus').innerHTML='';
  document.getElementById('ocrMsg').textContent='';
  document.getElementById('ocrInput').value='';
}
function closeOCR(){
  document.getElementById('ocrModal').classList.remove('show');
}

async function runOCR(event){
  const file = event.target.files[0];
  if(!file) return;
  document.getElementById('ocrStatus').innerHTML = '<div class="spinner"></div> <span style="color:#888">识别中...</span>';
  document.getElementById('ocrResult').innerHTML='';

  try{
    const worker = await Tesseract.recognize(file, 'chi_sim+eng', {
      logger: m => {
        if(m.status==='recognizing text'){
          document.getElementById('ocrStatus').innerHTML = `<span style="color:#888">识别中... ${Math.round(m.progress*100)}%</span>`;
        }
      }
    });
    const text = worker.data.text.trim();
    if(!text){ document.getElementById('ocrStatus').innerHTML='<span style="color:#999">未识别到文字</span>'; return; }

    const lines = text.split('\n').filter(l=>l.trim());
    document.getElementById('ocrStatus').innerHTML = '<span style="color:#16a34a">识别到 '+lines.length+' 行，勾选要添加的：</span>';
    document.getElementById('ocrResult').innerHTML = lines.map((l,i)=>
      `<label><input type="checkbox" value="${i}" ${l.length>2?'checked':''}> ${escHtml(l)}</label>`
    ).join('');
  }catch(err){
    document.getElementById('ocrStatus').innerHTML = '<span style="color:#c00">识别失败，请重试</span>';
    console.error(err);
  }
}

function addOCRSelection(){
  const checks = document.querySelectorAll('#ocrResult input:checked');
  const cat = document.getElementById('ocrCategory').value;
  let added = 0;
  checks.forEach(cb=>{
    const text = cb.parentElement.textContent.trim();
    if(!text) return;
    if(cat==='idiom'){
      // 尝试拆分：第一行=成语，后面=释义
      const idx = text.indexOf('：')!==-1 ? text.indexOf('：') : text.indexOf(':');
      if(idx!==-1){
        entries.push({id:nextId(),cat:'idiom',content:text.slice(0,idx).trim(),meaning:text.slice(idx+1).trim(),note:'',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()});
      } else {
        entries.push({id:nextId(),cat:'idiom',content:text,meaning:'',note:'',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()});
      }
    } else {
      entries.push({id:nextId(),cat:'quote',content:text,note:'',meaning:'',mastered:false,reviewCount:0,lastReview:null,ts:Date.now()});
    }
    added++;
  });
  save();
  document.getElementById('ocrMsg').textContent = '已添加 '+added+' 条';
  setTimeout(()=>{document.getElementById('ocrMsg').textContent='';},3000);
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ==================== 导出导入清空 ====================
function exportData(){
  const blob = new Blob([JSON.stringify(entries,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '复习备份_'+new Date().toISOString().slice(0,10)+'.json';
  a.click(); showToast('已导出');
}
function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  showModal('导入备份','导入将覆盖当前所有数据，确认？',()=>{
    const reader = new FileReader();
    reader.onload = function(){
      try{ const data = JSON.parse(reader.result); if(!Array.isArray(data)) throw new Error();
        entries = data; save(); if(currentPage==='review') doRandom(); if(currentPage==='list') renderList();
        showToast('导入成功，共 '+data.length+' 条');
      }catch(e){ showToast('文件格式不对'); }
    }; reader.readAsText(file);
  });
  event.target.value='';
}
function confirmClear(){
  showModal('清空数据','数据永久删除，不可恢复。确定？',()=>{
    entries=[];save(); if(currentPage==='review') doRandom(); if(currentPage==='list') renderList(); showToast('已清空');
  });
}

// ==================== 设置页存储 ====================
function showStorage(){
  const bytes = new Blob([JSON.stringify(entries)]).size;
  document.getElementById('entryCount').textContent = entries.length + ' 条';
  document.getElementById('masteredCount').textContent = entries.filter(e=>e.mastered).length + ' 条';
  if(bytes < 1024) document.getElementById('storageSize').textContent = bytes + ' B';
  else if(bytes < 1048576) document.getElementById('storageSize').textContent = (bytes/1024).toFixed(1) + ' KB';
  else document.getElementById('storageSize').textContent = (bytes/1048576).toFixed(2) + ' MB';
}

// ==================== 弹窗 ====================
let modalCallback=null;
function showModal(title,msg,onConfirm){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalMsg').textContent=msg;
  document.getElementById('modal').classList.add('show');
  modalCallback=onConfirm;
}
document.getElementById('modalConfirm').addEventListener('click',()=>{document.getElementById('modal').classList.remove('show');if(modalCallback)modalCallback();modalCallback=null;});
document.getElementById('modalCancel').addEventListener('click',()=>{document.getElementById('modal').classList.remove('show');modalCallback=null;});

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 24px;border-radius:8px;font-size:.85rem;z-index:200;transition:.3s;opacity:0;pointer-events:none';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._tid);t._tid=setTimeout(()=>{t.style.opacity='0';},1800);
}

// ==================== 聊天 ====================
let chatHistory = [];

async function handleChatImage(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!apiKey){ showToast('请先在设置页保存 API Key'); return; }

  // 显示用户发了图片
  chatHistory.push({role:'user',content:'[上传了一张题目图片]'});
  renderChat();
  document.getElementById('chatMsgs').innerHTML += '<div class="chat-msg ai"><div class="chat-bubble"><div class="spinner"></div> 识别中...</div></div>';
  scrollChat();

  try{
    // OCR 识别
    const worker = await Tesseract.recognize(file, 'chi_sim+eng');
    const ocrText = worker.data.text.trim();
    if(!ocrText){
      chatHistory.push({role:'assistant',content:'未识别到文字，请确保图片清晰。'});
      renderChat(); return;
    }

    // 替换上一条用户消息
    chatHistory[chatHistory.length-1] = {role:'user',content:'请帮我分析这道题目：\n'+ocrText};

    // 发送给 AI
    const resp = await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:apiModel,
        messages:[
          {role:'system',content:'你是公考辅导专家。用户上传了题目截图，经OCR识别后发给你。请仔细分析题目，给出解答思路和答案。如果是选择题，逐一分析每个选项。'},
          ...chatHistory.slice(-10)
        ],
        max_tokens:1000,
        temperature:0.3
      })
    });
    const data = await resp.json();
    if(data.choices && data.choices[0]){
      chatHistory.push({role:'assistant',content:data.choices[0].message.content});
    } else {
      chatHistory.push({role:'assistant',content:'请求失败：'+JSON.stringify(data)});
    }
    renderChat();
  }catch(e){
    chatHistory.push({role:'assistant',content:'识别出错：'+e.message});
    renderChat();
  }
  event.target.value = '';
}

function sendChat(){
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  if(!apiKey){ showToast('请先在设置页保存 API Key'); return; }

  // 显示用户消息
  chatHistory.push({role:'user',content:msg});
  renderChat();
  input.value = '';

  // 显示加载
  document.getElementById('chatMsgs').innerHTML += '<div class="chat-msg ai"><div class="chat-bubble"><div class="spinner"></div></div></div>';
  scrollChat();

  // 调用 API
  fetch('https://api.deepseek.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
    body:JSON.stringify({
      model:apiModel,
      messages:[
        {role:'system',content:'你是公考辅导专家，擅长行测言语理解、申论写作、成语辨析、名句解读。回答简明扼要，300字以内。'},
        ...chatHistory.slice(-10)
      ],
      max_tokens:600,
      temperature:0.5
    })
  }).then(r=>r.json()).then(data=>{
    if(data.choices && data.choices[0]){
      chatHistory.push({role:'assistant',content:data.choices[0].message.content});
    } else {
      chatHistory.push({role:'assistant',content:'请求失败：'+JSON.stringify(data)});
    }
    renderChat();
  }).catch(e=>{
    chatHistory.push({role:'assistant',content:'网络错误：'+e.message});
    renderChat();
  });
}

function renderChat(){
  const msgs = document.getElementById('chatMsgs');
  if(!chatHistory.length){
    msgs.innerHTML = '<div class="chat-empty"><div class="icon">💬</div><p>AI 学习助手</p><p style="font-size:.8rem">提问公考相关问题</p></div>';
    return;
  }
  msgs.innerHTML = chatHistory.map(m=>`
    <div class="chat-msg ${m.role==='user'?'user':'ai'}">
      <div class="chat-bubble">${escHtml(m.content)}</div>
    </div>
  `).join('');
  scrollChat();
}

function scrollChat(){
  setTimeout(()=>{
    const msgs = document.getElementById('chatMsgs');
    msgs.scrollTop = msgs.scrollHeight;
  },100);
}
